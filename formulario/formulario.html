<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Trabalhando com Formulário</h1>
    <section>
        <form action="cadastro.php" method="post" autocomplete="on">
            <fieldset>
                <legend>Dados do Aluno</legend>
                <p>
                    <label for="inome">Nome</label>
                    <input type="text" name="nome" id="inome" autocomplete="name" placeholder="Nome Completo" required>
                </p>
                <p>
                   <label for="iano">Em que ano você nasceu? </label> 
                   <input type="number" name="ano" id="iano" required min="1900" max="2022" oninput="calcIdade()"> <br>
                   <label for="iidade">Em 2022, sua idade será </label>
                   <output id="iidade">0 anos</output>
                </p>
                <p>
                    <label for="imas">Masculino</label>
                    <input type="radio" name="sexo" id="imas" required>
                    <label for="ifem">Feminino</label>
                    <input type="radio" name="sexo" id="ifem">
                </p>
               <p>
                    <label for="iest">Estado </label>
                    <select name="est" id="iest">
                        <option value="" selected>--- Escolha ---</option>
                        <optgroup label="Região Sudeste">
                            <option value="SP">São Paulo</option>
                            <option value="MG">Minas Gerais</option>
                            <option value="RJ">Rio de Janeiro</option>
                        </optgroup>
                        <optgroup label="Região Sul">
                            <option value="PA">Paraná</option>
                            <option value="SC">Santa Catarina</option>
                            <option value="RS">Rio Grande do Sul</option>
                        </optgroup>
                    </select>
               </p>
                <p>
                    <label for="icor">Cor da Prova </label>
                    <input type="color" name="cor" id="icor">
                </p>
                <p>
                    <label for="imedia">Média</label>
                    <input type="number" name="media" id="imedia" step="0.1" placeholder="0 a 10" min="0" max="10" required>
                </p>
                <p>
                    <label for="imes">Período Letivo </label>
                    <input type="month" name="mes" id="imes" required>
                </p>
                <p>
                    <label for="idia">Dia da Prova</label>
                    <input type="date" name="dia" id="idia" required>
                </p>
                <p>
                    <label for="ihora">Horário da Prova</label>
                    <input type="time" name="hora" id="ihora" required>
                </p>
                <p>
                    <label for="ifoto">Foto Doc Escolar </label>
                    <input type="file" name="foto" id="ifoto">
                </p>
                <p class="soma">
                    <label for="in1">Número 1 </label>
                    <input type="number" name="n1" id="in1" required oninput="isoma.innerHTML = Number(in1.value) + Number(in2.value)"> <br>
                    <label for="in2">Número 2 </label>
                    <input type="number" name="n2" id="in2" required oninput="isoma.innerHTML = Number(in1.value) + Number(in2.value)"> <br>
                    <label for="isoma"">A soma de n1 + n2 é = </label>
                    <output name="soma" id="isoma">0</output>
                </p>
            </fieldset>
            <fieldset>
                <legend>Informações do Responsável Legal</legend>
                <p>
                    <label for="iemail">E-mail</label>
                    <input type="email" name="email" id="iemail" placeholder="usuario@exemplo.com" required autocomplete="email">
                </p>
                <p>
                    <label for="itel">Telefone</label>
                    <input type="tel" name="tel" id="itel" placeholder="(xx) xxxx-xxxx" required autocomplete="tel" pattern="^\d{2}\(4,5}-\d{4}$">
                </p>
                <p>
                    <label for="iprof">Profissão</label>
                    <input type="text" name="prof" id="iprof" list="lstprof">
                    <datalist id="lstprof">
                        <option>Autonomo</option>
                        <option>Desempregado</option>
                        <option>Administrador</option>
                        <option>Advogado</option>
                        <option>Detetive</option>
                        <option>Jogador de Futebol</option>
                        <option>Contador</option>
                        <option>Desenvolvedor</option>
                        <option>Professor</option>
                    </datalist>
                </p>
            </fieldset>
            <fieldset>
                <legend>Hobbies</legend>
                    <input type="checkbox" name="fut" id="ifut"><label for="ifut">Futebol </label> <br>
                    <input type="checkbox" name="bas" id="ibas"><label for="ibas">Basquete </label> <br>
                    <input type="checkbox" name="vol" id="ivol"><label for="ivol">Vôlei </label> <br>
                    <input type="checkbox" name="han" id="ihan"><label for="ihan">Handball </label> <br>
                    <input type="checkbox" name="corr" id="icorr"><label for="icorr">Corrida </label> <br>
                    <input type="checkbox" name="nat" id="inat"><label for="inat">Natação </label> <br>
                    <input type="checkbox" name="cr" id="icr"><label for="icr">É fã do Cristiano Ronaldo? </label> <br>
                    <label for="icris" style="text-align: left;"> Quão fã você é do melhor do mundo?   </label><input type="range" name="cris" id="icris" min="0" max="1000" style="display: block;" value="500" oninput="ival.innerHTML = Number(icris.value)">
                    <output id="ival">500</output>
            </fieldset>
            <fieldset>
                <legend>Feedback</legend>
                <p>
                    <label for="imsg">Diga-me o que achou deste formulário</label> <br>
                    <textarea name="msg" id="imsg" cols="50" rows="10"></textarea>
                </p>
            </fieldset>
            <p>
                <input type="submit" value="Enviar">
                <input type="reset" value="Limpar">
            </p>
        </form>
        <script>
            function calcIdade() {
                let atual = new Date().getFullYear()
                iidade.innerHTML = Number (atual) - Number (iano.value)
            }
        </script>
    </section>
</body>
</html>
